title: Tiered Startup Architecture
description: A hook-based system for reliable AI agent sessions
baseurl: "/agentic-ai-tiered-startup"    # Change to your repo name if you fork
url: "https://dexmaddy.github.io"       # Change to your GitHub Pages URL if you fork

theme: just-the-docs

color_scheme: light

nav_order_default: 0
nav_enabled: true

# Dark/light theme toggle
enable_dark_mode: true

# Mermaid diagram rendering
mermaid:
  version: "11"

exclude:
  - Gemfile
  - Gemfile.lock
  - hooks/
  - tests/
  - examples/
  - .github/
  - LICENSE
  - setup.py

defaults:
  - scope:
      path: "course"
    values:
      parent: "Course"
